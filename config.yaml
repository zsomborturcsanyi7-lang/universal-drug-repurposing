# Universal Drug Repurposing Platform — Configuration
# ═══════════════════════════════════════════════════════════════
#
# This file is auto-managed by receptor_prep.py.
# You can also manually add targets below.
#
# Usage:
#   python hermes_drug.py --pdb 6LU7         # Auto-detects everything
#   python hermes_drug.py --pdb 6LU7 --deep  # Full screening
#   python hermes_drug.py --interactive      # Guided mode

# ── Defaults (applied to all targets unless overridden) ──────
defaults:
  exhaustiveness: 8     # Vina search thoroughness (1=fast, 32=exhaustive)
  cpu: 0                # CPUs to use (0 = auto-detect)
  grid_spacing: 0.375   # Angstroms
  num_modes: 9          # Max binding modes to output
  energy_range: 3       # kcal/mol from best mode
  cloud_provider: "kaggle"
  kaggle_username: "YOUR_KAGGLE_USERNAME"
  kaggle_dataset: "ai-drug-workspace"
  kaggle_kernel: "ai-drug-docking-execution"

# ── Screening configuration ──────────────────────────────────
screening:
  quick_max_ligands: 10    # Quick mode: dock top-N AI hits
  standard_max_ligands: 50  # Standard mode
  deep_max_ligands: 200    # Deep mode (may need cloud)
  
  ml_proxy_model: "vina_affinity_proxy.pkl"
  similarity_threshold: 0.4  # Tanimoto cutoff for analogue search
  variant_count: 50          # Variants per lead molecule

# ── Cached targets (auto-populated by receptor_prep.py) ─────
